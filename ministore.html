const WHATSAPP = "212707074748";
let filtered = [...PRODUCTS];
let currentProductIdx = null;
let currentSelection = {};  // axis_name -> value

function fmtPrice(v) { return v == null ? "" : Math.round(v) + " MAD"; }
function priceRange(p) {
  if (!p.price_min) return "";
  if (p.price_min === p.price_max || !p.price_max) return fmtPrice(p.price_min);
  return fmtPrice(p.price_min) + " – " + fmtPrice(p.price_max);
}
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render() {
  document.getElementById("count").textContent = filtered.length + " produits";
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.map((p) => {
    const badge = p.images.length > 1 ? `<div class="badge">${p.images.length} photos</div>`
      : (p.variants.length > 1 ? `<div class="badge">${p.variants.length} options</div>` : "");
    const price = priceRange(p);
    const idx = PRODUCTS.indexOf(p);
    return `<div class="card" onclick="openModal(${idx})">
      <div class="img-wrap"><img src="${p.image}" alt="${escapeHtml(p.title)}" loading="lazy">${badge}</div>
      <div class="info">
        <div class="name">${escapeHtml(p.title)}</div>
        ${price ? `<div class="price">${price}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

function findMatchingVariant(product, selection) {
  // Find the variant whose axes match ALL selected values
  return product.variants.find(v => {
    return Object.keys(selection).every(axis => v.axes[axis] === selection[axis]);
  });
}

function isValueAvailable(product, axis, value, currentSel) {
  // Given the current selection for OTHER axes, is this value reachable?
  const testSel = { ...currentSel, [axis]: value };
  return product.variants.some(v => {
    return Object.keys(testSel).every(ax => v.axes[ax] === testSel[ax]);
  });
}

function openModal(idx) {
  currentProductIdx = idx;
  const p = PRODUCTS[idx];

  // Initial selection: pick the first available value for each axis
  currentSelection = {};
  for (const axis of p.axis_order) {
    if (p.axes[axis] && p.axes[axis].length) {
      currentSelection[axis] = p.axes[axis][0];
    }
  }

  renderModal();
  document.getElementById("modal").classList.add("active");
  document.body.style.overflow = "hidden";
}

function renderModal() {
  const p = PRODUCTS[currentProductIdx];
  const matchingVariant = findMatchingVariant(p, currentSelection);

  // Price display
  let priceHtml;
  if (matchingVariant && matchingVariant.price != null) {
    priceHtml = `<div class="current-price">${fmtPrice(matchingVariant.price)}</div>`;
  } else if (p.price_min) {
    priceHtml = `<div class="current-price">${priceRange(p)}<span class="range-note">selon options</span></div>`;
  } else {
    priceHtml = "";
  }

  // Options
  const optionsHtml = p.axis_order.map(axis => {
    const values = p.axes[axis] || [];
    if (!values.length) return "";
    const selectedVal = currentSelection[axis];

    const pillsHtml = values.map(val => {
      const isSelected = val === selectedVal;
      // Check availability given selection of other axes
      const otherAxes = {};
      for (const [ax, v] of Object.entries(currentSelection)) {
        if (ax !== axis) otherAxes[ax] = v;
      }
      const available = isValueAvailable(p, axis, val, otherAxes);
      const cls = ["pill"];
      if (isSelected) cls.push("selected");
      if (!available) cls.push("unavailable");
      return `<div class="${cls.join(' ')}" onclick="selectOption('${escapeAttr(axis)}', '${escapeAttr(val)}')">${escapeHtml(val)}</div>`;
    }).join("");

    return `
      <div class="option-group">
        <div class="option-label">
          <span>${escapeHtml(axis)}</span>
          <span class="selected-val">${escapeHtml(selectedVal || '')}</span>
        </div>
        <div class="pills">${pillsHtml}</div>
      </div>`;
  }).join("");

  const noMatch = !matchingVariant && Object.keys(currentSelection).length > 0
    ? `<div class="no-match">Cette combinaison n'est pas disponible. Essayez une autre option.</div>`
    : "";

  const canOrder = matchingVariant != null || Object.keys(p.axes).length === 0;

  document.getElementById("modal-inner").innerHTML = `
    <div class="modal-images">
      <div class="main-img"><img id="main-img" src="${p.image}" alt=""></div>
      ${p.images.length > 1 ? `<div class="thumbs">${p.images.map((img, i) =>
        `<img src="${img}" alt="Image produit" onclick="swapImage('${escapeAttr(img)}', this)" class="${i===0?'active':''}">`
      ).join("")}</div>` : ""}
    </div>
    <div class="modal-info">
      <h2>${escapeHtml(p.title)}</h2>
      ${priceHtml}
      ${p.desc ? `<div class="desc">${escapeHtml(p.desc)}</div>` : ""}
      ${optionsHtml}
      ${noMatch}
      <button class="whatsapp-btn" ${!canOrder ? 'disabled' : ''} onclick="orderOnWhatsApp()">
        Commander sur WhatsApp
      </button>
    </div>`;
}

function escapeAttr(s) { return String(s || "").replace(/'/g, "&#39;").replace(/"/g, "&quot;"); }

function selectOption(axis, value) {
  currentSelection[axis] = value;
  renderModal();
}

function swapImage(url, el) {
  document.getElementById("main-img").src = url;
  document.querySelectorAll(".thumbs img").forEach(x => x.classList.remove("active"));
  el.classList.add("active");
}

function orderOnWhatsApp() {
  const p = PRODUCTS[currentProductIdx];
  const variant = findMatchingVariant(p, currentSelection);

  let msg = `Bonjour, je suis intéressé(e) par:\n\n*${p.title}*`;
  for (const [axis, val] of Object.entries(currentSelection)) {
    msg += `\n${axis}: ${val}`;
  }
  if (variant && variant.price != null) {
    msg += `\nPrix: ${fmtPrice(variant.price)}`;
  } else if (p.price_min) {
    msg += `\nPrix: ${priceRange(p)}`;
  }
  msg += `\n\nMerci de me donner plus d'informations.`;

  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  document.body.style.overflow = "";
  currentProductIdx = null;
}

document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  filtered = !q ? [...PRODUCTS] : PRODUCTS.filter(p =>
    p.title.toLowerCase().includes(q) || (p.desc || "").toLowerCase().includes(q)
  );
  render();
});

render();
</script>
