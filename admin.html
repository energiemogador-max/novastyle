<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Style — Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
    /* --- VOS STYLES ORIGINAUX (CONSERVÉS) --- */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at top,#1a0a0e 0%,#0f0f0f 70%)}
    .login-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-logo .brand{font-size:26px;font-weight:800;color:#e8194b;letter-spacing:-1px}
    .login-logo .sub{font-size:12px;color:#444;margin-top:4px;letter-spacing:2px}
    input, select, button{width:100%;padding:12px;margin-bottom:16px;border-radius:8px;border:1px solid #2a2a2a;background:#0a0a0a;color:#fff;font-size:14px;outline:none}
    input:focus{border-color:#e8194b}
    button.btn{background:#e8194b;color:#fff;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
    button.btn:hover{background:#ff1e56;transform:translateY(-1px)}
    
    #admin-dashboard{display:none;padding:20px;max-width:1000px;margin:0 auto}
    .tabs{display:flex;gap:10px;margin-bottom:30px;border-bottom:1px solid #222;padding-bottom:10px}
    .tab{padding:10px 20px;cursor:pointer;color:#666;font-weight:600;transition:.2s;font-size:13px}
    .tab.active{color:#e8194b;border-bottom:2px solid #e8194b}
    .card{background:#161616;border:1px solid #222;border-radius:12px;padding:24px;margin-bottom:20px}
    .review-item{display:flex;justify-content:space-between;align-items:center;padding:15px;border-bottom:1px solid #222;font-size:13px}
    
    /* --- STYLES CATALOGUE --- */
    .ref-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; cursor: pointer; transition: 0.2s; }
    .ref-card:hover { border-color: #e8194b; background: #161616; }
    .ref-card.selected { border-color: #e8194b; box-shadow: 0 0 10px rgba(232, 25, 75, 0.2); }
    .code-output { background: #000; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; overflow-x: auto; white-space: pre; border: 1px solid #333; margin-top: 10px; }
    .axis-group { background: #111; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid #e8194b; }
</style>
</head>
<body>

<section id="login-screen">
    <div class="login-card">
        <div class="login-logo"><div class="brand">NOVA STYLE</div><div class="sub">ADMIN</div></div>
        <input type="password" id="admin-pass" placeholder="Mot de passe">
        <button class="btn" onclick="checkAuth()">Accéder</button>
    </div>
</section>

<section id="admin-dashboard">
    <div class="tabs">
        <div class="tab active" onclick="showTab('stats')">STATISTIQUES</div>
        <div class="tab" onclick="showTab('reviews')">AVIS CLIENTS</div>
        <div class="tab" onclick="showTab('catalog')">CATALOGUE</div>
        <button onclick="logout()" style="width:auto; background:transparent; border:none; color:#444; margin-left:auto; cursor:pointer; font-size:11px">DÉCONNEXION</button>
    </div>

    <div id="stats-screen" class="screen">
        <div id="stats-container" class="card">Chargement...</div>
    </div>

    <div id="reviews-screen" class="screen" style="display:none">
        <div class="card"><h3>En attente</h3><div id="pending-list"></div></div>
        <div class="card"><h3>En ligne</h3><div id="approved-list"></div></div>
    </div>

    <div id="catalog-screen" class="screen" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:#e8194b; font-size:18px;">Nouveau Produit</h2>
                <div id="stepper-head" style="font-size:10px; color:#555; background:#111; padding:4px 10px; border-radius:10px;">Étape 1 / 3</div>
            </div>
            <div id="catalog-content"></div>
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid #222; display:flex; justify-content:space-between;">
                <button id="btn-prev" class="btn" style="background:#333; width:auto; padding:8px 20px; display:none;" onclick="prevStep()">Retour</button>
                <button id="btn-next" class="btn" style="width:auto; padding:8px 20px; margin-left:auto;" onclick="nextStep()">Suivant</button>
            </div>
        </div>
    </div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = { apiKey: "VOTRE_API", databaseURL: "VOTRE_URL", projectId: "VOTRE_ID" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkAuth() {
    if(document.getElementById('admin-pass').value === 'VOTRE_MDP') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        loadData();
    }
}
function logout() { location.reload(); }

function showTab(tabId) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId + '-screen').style.display = 'block';
    event.currentTarget.classList.add('active');
    if(tabId === 'catalog') renderCatalog();
}

// --- LOGIQUE STATS & AVIS (FULL CONSERVÉE) ---
function loadData() {
    db.ref('reviews').on('value', snap => {
        const full = snap.val() || {};
        const el = document.getElementById('stats-container');
        const prods = Object.keys(full).length;
        const counts = Object.entries(full).map(([k,v]) => [k, Object.keys(v).length]);
        counts.sort((a,b) => b[1] - a[1]);
        const total = counts.reduce((s,[,c]) => s+c, 0);
        const approved = Object.values(full).flatMap(p => Object.values(p)).filter(r => r.approved).length;

        // Rendu Stats
        el.innerHTML = `
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px">
                <div class="card" style="text-align:center; margin:0"><div style="font-size:24px; font-weight:800; color:#e8194b">${total}</div><div style="font-size:10px; color:#444">AVIS TOTAL</div></div>
                <div class="card" style="text-align:center; margin:0"><div style="font-size:24px; font-weight:800; color:#00c853">${approved}</div><div style="font-size:10px; color:#444">APPROUVÉS</div></div>
                <div class="card" style="text-align:center; margin:0"><div style="font-size:24px; font-weight:800; color:#ffb300">${prods}</div><div style="font-size:10px; color:#444">PRODUITS</div></div>
            </div>
            <div style="font-size:11px; color:#444; margin-bottom:10px">TOP PRODUITS :</div>
            ${counts.slice(0,5).map(([id, c]) => `<div style="display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid #1a1a1a"><span>${id}</span><b>${c}</b></div>`).join('')}
        `;

        // Rendu Listes Avis
        const pList = document.getElementById('pending-list');
        const aList = document.getElementById('approved-list');
        pList.innerHTML = ''; aList.innerHTML = '';
        Object.entries(full).forEach(([pid, reviews]) => {
            Object.entries(reviews).forEach(([rid, rev]) => {
                const h = `<div class="review-item"><div><b>${rev.name}</b> (${rev.rating}⭐)<br>${rev.text}</div>
                           <div style="display:flex; gap:10px">${!rev.approved ? `<button onclick="approve('${pid}','${rid}')" style="background:#00c853; padding:5px 10px; border:none; border-radius:4px; color:#fff">V</button>` : ''}
                           <button onclick="del('${pid}','${rid}')" style="background:#333; padding:5px 10px; border:none; border-radius:4px; color:#fff">X</button></div></div>`;
                rev.approved ? aList.innerHTML += h : pList.innerHTML += h;
            });
        });
    });
}
function approve(p,r) { db.ref(`reviews/${p}/${r}`).update({approved:true}); }
function del(p,r) { if(confirm('Supprimer ?')) db.ref(`reviews/${p}/${r}`).remove(); }

// --- LOGIQUE CATALOGUE (INTÉGRATION PROPRE) ---
const REFERENCE_PRODUCTS = {
  "miroir-maroc-nova-style-miroir-anfa": {
    label: "Miroir Anfa (SDB LED)",
    axis_order: ["Dimension", "LED", "Installation"],
    axes: {
      Dimension: ["80 L x 140 H cm","80 L x 120 H cm","75 L x 130 H cm","60 L x 120 H cm","55 L x 110 H cm","50 L x 140 H cm","50 L x 100 H cm","45 L x 90 H cm"],
      LED: ["Sans LED","6000K Blanc pur","4000K blanc lumière du jour","3000K Jaune","2000k Doré"],
      Installation: ["Sans Installation","Avec Installation"]
    }
  },
  "miroir-organique-nova-style-clart": {
    label: "Miroir Clarté (Organique)",
    axis_order: ["Dimension", "LED", "Installation"],
    axes: {
      Dimension: ["100 L x 100 H cm","80 L x 80 H cm","70 L x 70 H cm","60 L x 60 H cm","50 L x 50 H cm"],
      LED: ["Sans LED","6000K Blanc pur","4000K blanc lumière du jour","3000K Jaune"],
      Installation: ["Sans Installation","Avec Installation"]
    }
  }
};

let step = 0;
let form = { name: '', slug: '', img: '', ref: '' };

function renderCatalog() {
    const cont = document.getElementById('catalog-content');
    const head = document.getElementById('stepper-head');
    const bP = document.getElementById('btn-prev');
    const bN = document.getElementById('btn-next');
    
    head.innerText = `Étape ${step + 1} / 3`;
    bP.style.display = step === 0 ? 'none' : 'block';
    bN.innerText = step === 2 ? 'GÉNÉRER' : 'SUIVANT';

    if(step === 0) {
        cont.innerHTML = `
            <input type="text" placeholder="Nom du produit" value="${form.name}" oninput="form.name=this.value">
            <input type="text" placeholder="ID / Slug (ex: miroir-royal)" value="${form.slug}" oninput="form.slug=this.value">
            <input type="text" placeholder="URL Image" value="${form.img}" oninput="form.img=this.value">`;
    } else if(step === 1) {
        cont.innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">` + 
            Object.entries(REFERENCE_PRODUCTS).map(([k,v]) => `
                <div class="ref-card ${form.ref === k ? 'selected' : ''}" onclick="form.ref='${k}';renderCatalog()">
                    <div style="font-weight:700; font-size:12px">${v.label}</div>
                </div>`).join('') + `</div>`;
    } else {
        cont.innerHTML = `<div id="res" class="code-output">Cliquez sur Générer pour voir le code...</div>`;
    }
}

function nextStep() {
    if(step < 2) { step++; renderCatalog(); }
    else {
        const refData = REFERENCE_PRODUCTS[form.ref];
        document.getElementById('res').innerText = `// catalog.js\n${JSON.stringify({id:form.slug, name:form.name, image:form.img}, null, 2)}\n\n// Page JS\nconst AXES = ${JSON.stringify(refData.axes, null, 2)};`;
    }
}
function prevStep() { if(step > 0) { step--; renderCatalog(); } }
</script>
</body>
</html>
