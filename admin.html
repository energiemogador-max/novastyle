<script visitor-tracker.js>
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Votre config récupérée sur la console
  const firebaseConfig = {
    apiKey: "AIzaSyB2RjmI_KcLc5j9mcmcyAjdCQjrBNlQjlc",
    authDomain: "nova-9ac76.firebaseapp.com",
    projectId: "nova-9ac76",
    databaseURL: "https://nova-9ac76-default-rtdb.europe-west1.firebasedatabase.app",
    appId: "1:645613145752:web:775e6f8ffce64ae12c4aed"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ÉCOUTEUR INSTANTANÉ
  const ordersRef = ref(db, 'orders');
  
  onValue(ordersRef, (snapshot) => {
    const data = snapshot.val();
    const container = document.getElementById('orders-display'); // Vérifiez cet ID dans votre HTML
    
    if (!data) {
      container.innerHTML = "<div class='no-order'>En attente de nouvelles commandes...</div>";
      return;
    }

    // Transformer l'objet en tableau et trier par le plus récent
    const list = Object.entries(data).sort((a, b) => b[1].timestamp - a[1].timestamp);

    container.innerHTML = list.map(([id, order]) => `
      <div class="order-card pulse-animation">
        <div class="order-id">ID: ${id.slice(-5)}</div>
        <div class="order-customer">${order.customer.name} - ${order.customer.city}</div>
        <div class="order-total">${order.total} MAD</div>
        <div class="order-time">${new Date(order.timestamp).toLocaleTimeString()}</div>
      </div>
    `).join('');

    // Jouer un son si une nouvelle commande arrive
    playNotificationSound(); 
  });

  function playNotificationSound() {
    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    audio.play().catch(() => {
      console.log("Le navigateur bloque le son tant que vous n'avez pas cliqué sur la page.");
    });
  }
</script>
