<style>
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }
  
  .cart-header h1 {
    font-size: 28px;
    margin: 0;
  }
  
  .continue-btn {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  
  .continue-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  .checkout-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
    margin-bottom: 30px;
  }
  
  @media (max-width: 900px) {
    .checkout-grid {
      grid-template-columns: 1fr;
    }
  }
  
  .cart-items {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  
  .cart-items h2 {
    font-size: 18px;
    margin-top: 0;
    margin-bottom: 20px;
  }
  
  .empty-cart {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  
  .empty-cart-btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    margin-top: 16px;
  }
  
  .cart-item {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  
  .cart-item:last-child {
    border-bottom: none;
  }
  
  .item-name {
    font-weight: 500;
  }
  
  .item-price {
    color: var(--accent);
    font-weight: 600;
    min-width: 100px;
    text-align: right;
  }
  
  .item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
  }
  
  .qty-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-weight: bold;
    color: var(--text);
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .qty-btn:hover {
    background: var(--accent-dim);
  }
  
  .qty-input {
    width: 40px;
    border: none;
    background: none;
    text-align: center;
    font-weight: 600;
  }
  
  .remove-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: opacity 0.2s;
  }
  
  .remove-btn:hover {
    opacity: 0.8;
  }
  
  .checkout-sidebar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    height: fit-content;
    display: flex;
    flex-direction: column;
  }
  
  .checkout-sidebar h3 {
    font-size: 16px;
    margin-top: 0;
    margin-bottom: 16px;
  }
  
  .order-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 16px;
  }
  
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }
  
  .form-group input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  
  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }
  
  .summary {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  
  .summary-line {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }
  
  .summary-line.total {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-top: 6px;
  }
  
  .checkout-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .btn-checkout {
    padding: 12px 16px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    text-align: center;
  }
  
  .btn-whatsapp {
    background: var(--green);
    color: white;
  }
  
  .btn-whatsapp:hover {
    opacity: 0.9;
  }
  
  .btn-form {
    background: var(--accent);
    color: white;
  }
  
  .btn-form:hover {
    opacity: 0.9;
  }
  
  .notification {
    background: var(--red);
    color: white;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .modal-overlay.active {
    display: flex;
  }
  
  .modal-content {
    background: var(--card);
    border-radius: 12px;
    padding: 28px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  
  .modal-close {
    float: right;
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--muted);
    margin-top: -8px;
  }
  
  .modal-close:hover {
    color: var(--text);
  }
  
  .modal-form h2 {
    clear: both;
    font-size: 20px;
    margin-bottom: 20px;
  }
  
  .modal-form .form-group {
    margin-bottom: 14px;
  }
  
  .modal-form textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  
  .modal-form textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }
  
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  
  .modal-actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  
  .btn-submit {
    background: var(--green);
    color: white;
  }
  
  .btn-submit:hover {
    opacity: 0.9;
  }
  
  .btn-cancel {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
  }
  
  .btn-cancel:hover {
    background: var(--border);
  }
  
  @media (max-width: 600px) {
    .cart-item {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    
    .item-price,
    .item-qty,
    .remove-btn {
      grid-column: 1 / -1;
    }
  }
</style>

<body>

<script src="/assets/header.js" defer></script>

<div class="container">
  <div class="cart-header">
    <h1>Votre Panier</h1>
    <button class="continue-btn" onclick="continueShopping()">← Continuer vos achats</button>
  </div>
  
  <div class="checkout-grid">
    <div class="cart-items" id="cart-items-container">
      <!-- Cart items will be rendered here -->
    </div>
    
    <div class="checkout-sidebar">
      <h3>Résumé de commande</h3>
      
      <div class="summary">
        <div class="summary-line">
          <span>Sous-total:</span>
          <span id="subtotal">0 MAD</span>
        </div>
        <div class="summary-line">
          <span>Livraison:</span>
          <span id="shipping">À déterminer</span>
        </div>
        <div class="summary-line total">
          <span>Total:</span>
          <span id="total">0 MAD</span>
        </div>
      </div>
      
      <div id="order-note" class="notification" style="display: none; background: var(--accent-dim); color: var(--text); border: 1px solid var(--accent);">
        Note: Acompte de 50% sera demandé au premier contact
      </div>
      
      <div class="checkout-actions" id="checkout-actions">
        <!-- Buttons will be rendered here -->
      </div>
    </div>
  </div>
</div>

<!-- Modal for form-based order -->
<div class="modal-overlay" id="form-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeOrderModal()">×</button>
    <div class="modal-form">
      <h2>Formulaire de Commande</h2>
      
      <div class="form-group">
        <label>Nom complet *</label>
        <input type="text" id="form-name" placeholder="Votre nom">
      </div>
      
      <div class="form-group">
        <label>Numéro de téléphone *</label>
        <input type="tel" id="form-phone" placeholder="Exemple: 0612345678">
      </div>
      
      <div class="form-group">
        <label>Ville *</label>
        <input type="text" id="form-city" placeholder="Casablanca, Rabat, Marrakech...">
      </div>
      
      <div class="form-group">
        <label>Adresse *</label>
        <textarea id="form-address" rows="3" placeholder="Rue, code postal..."></textarea>
      </div>
      
      <div class="form-group">
        <label>Email (optionnel - pour confirmation de commande)</label>
        <input type="email" id="form-email" placeholder="votremail@example.com">
      </div>
      
      <div class="form-group">
        <label>Notes supplémentaires (optionnel)</label>
        <textarea id="form-notes" rows="2" placeholder="Options, personnalisations..."></textarea>
      </div>
      
      <div style="background: var(--bg-soft); padding: 12px; border-radius: 6px; margin: 16px 0; font-size: 14px;">
        <strong>Total:</strong> <span id="modal-total">0 MAD</span>
      </div>
      
      <div class="modal-actions">
        <button class="btn-submit" type="button" id="btn-submit-order" data-submit-order onclick="submitOrder()">Envoyer la commande</button>
        <button class="btn-cancel" onclick="closeOrderModal()">Annuler</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/assets/cart.js"></script>
<!-- cart.js exposes globals after the module executes; we poll until ready -->
<script>
// ── WAIT FOR cart.js MODULE TO EXPOSE ITS GLOBALS ──────────────────────────
// cart.js is type="module" (always deferred). We poll until window.getCart
// is available before running any cart logic.
function waitForCart(cb) {
  if (typeof window.getCart === 'function') { cb(); return; }
  let tries = 0;
  const id = setInterval(() => {
    tries++;
    if (typeof window.getCart === 'function') { clearInterval(id); cb(); }
    else if (tries > 100) { clearInterval(id); console.error('cart.js did not load in time'); }
  }, 30);
}

// ── CART RENDER ──────────────────────────────────────────────────────────────
// ⚠️  item.key contains JSON with double-quotes → NEVER put it inside onclick=""
//     Use data-key with encodeURIComponent and bind via addEventListener instead.
function renderCart() {
  if (typeof window.getCart !== 'function') return;
  const cart = window.getCart();
  const container = document.getElementById('cart-items-container');
  if (!container) return;

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <p>Votre panier est vide</p>
        <a href="/categorie/sdb-premium/" class="empty-cart-btn">Parcourir les produits</a>
      </div>
    `;
    updateCheckoutButtons();
    return;
  }

  container.innerHTML = `
    <h2>Articles dans votre panier (${cart.length})</h2>
    ${cart.map(item => {
      const safeKey = encodeURIComponent(item.key);
      return `
      <div class="cart-item" data-key="${safeKey}">
        <div class="item-name">
          <div><strong>${escHtml(item.name)}</strong></div>
          ${item.options ? `
            <div style="font-size:12px;color:var(--muted);margin-top:6px;">
              ${Object.entries(item.options).map(([k,v]) => `<div>\u2022 ${escHtml(k)}: ${escHtml(v)}</div>`).join('')}
            </div>
          ` : ''}
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">${window.formatPrice(item.price)} / unit\u00e9</div>
        </div>
        <div class="item-qty">
          <button class="qty-btn cart-dec" aria-label="Diminuer">\u2212</button>
          <input type="number" class="qty-input" value="${item.quantity}" min="1" max="99" aria-label="Quantit\u00e9">
          <button class="qty-btn cart-inc" aria-label="Augmenter">+</button>
        </div>
        <div class="item-price">${window.formatPrice(item.price * item.quantity)}</div>
        <button class="remove-btn cart-remove">\ud83d\uddd1 Retirer</button>
      </div>`;
    }).join('')}
  `;
  attachCartListeners();
  updateSummary();
}

// ── HTML ESCAPE ───────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ATTACH EVENT LISTENERS per cart row ───────────────────────────────────────
function attachCartListeners() {
  const container = document.getElementById('cart-items-container');
  if (!container) return;
  container.querySelectorAll('.cart-item').forEach(row => {
    const itemKey = decodeURIComponent(row.dataset.key);
    row.querySelector('.cart-dec').addEventListener('click', () => {
      const cart = window.getCart(), item = cart.find(i => i.key === itemKey);
      if (item && item.quantity > 1) { item.quantity--; window.saveCart(cart); renderCart(); }
    });
    row.querySelector('.cart-inc').addEventListener('click', () => {
      const cart = window.getCart(), item = cart.find(i => i.key === itemKey);
      if (item) { item.quantity = Math.min(99, (item.quantity||1)+1); window.saveCart(cart); renderCart(); }
    });
    const inp = row.querySelector('.qty-input');
    inp.addEventListener('change', () => {
      const newQty = Math.max(1, Math.min(99, parseInt(inp.value)||1));
      inp.value = newQty;
      const cart = window.getCart(), item = cart.find(i => i.key === itemKey);
      if (item && item.quantity !== newQty) {
        item.quantity = newQty; window.saveCart(cart);
        const priceEl = row.querySelector('.item-price');
        if (priceEl) priceEl.textContent = window.formatPrice(item.price * newQty);
        updateSummary();
      }
    });
    const removeBtn = row.querySelector('.cart-remove');
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      window.removeFromCart(itemKey);
    });
  });
}

function updateSummary() {
  if (typeof window.getCartTotal !== 'function') return;
  const total = window.getCartTotal();
  const fmt   = window.formatPrice;
  document.getElementById('subtotal').textContent    = fmt(total);
  document.getElementById('total').textContent       = fmt(total);
  document.getElementById('modal-total').textContent = fmt(total);
  updateCheckoutButtons();
}

// ── CHECKOUT BUTTONS ─────────────────────────────────────────────────────────
function updateCheckoutButtons() {
  const cart      = window.getCart();
  const actionsDiv = document.getElementById('checkout-actions');
  const noteDiv   = document.getElementById('order-note');
  if (!actionsDiv) return;

  if (cart.length === 0) {
    actionsDiv.innerHTML = '';
    noteDiv.style.display = 'none';
    return;
  }

  noteDiv.style.display = 'block';
  const total = window.getCartTotal();
  const fmt   = window.formatPrice;

  const cartSummary = encodeURIComponent(
    cart.map(i => {
      let line = `${i.name} x${i.quantity}`;
      if (i.options) line += ` (${Object.entries(i.options).map(([k,v]) => `${k}: ${v}`).join(', ')})`;
      return line;
    }).join('\n')
  );
  const whatsappUrl = `https://wa.me/212707074748?text=Bonjour%2C%20j'aimerais%20commander%3A%0A${cartSummary}%0A%0ATotal:%20${fmt(total).replace(/\s/g, '%20')}`;

  actionsDiv.innerHTML = `
    <a href="${whatsappUrl}" target="_blank" class="btn-checkout btn-whatsapp">
      💬 Acheter via WhatsApp
    </a>
    <button type="button" id="open-form-btn" class="btn-checkout btn-form" style="cursor:pointer">
      📝 Remplir le formulaire de commande
    </button>
  `;
  const _formBtn = document.getElementById('open-form-btn');
  if (_formBtn) _formBtn.addEventListener('click', function(e){ e.stopPropagation(); openOrderModal(); });
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openOrderModal() {
  if (window.getCart().length === 0) { alert('Votre panier est vide'); return; }
  document.getElementById('form-modal').classList.add('active');
}

function closeOrderModal() {
  document.getElementById('form-modal').classList.remove('active');
}

// ── FORM SUBMIT ───────────────────────────────────────────────────────────────
function submitOrder() {
  const name    = document.getElementById('form-name').value.trim();
  const phone   = document.getElementById('form-phone').value.trim();
  const city    = document.getElementById('form-city').value.trim();
  const address = document.getElementById('form-address').value.trim();
  const notes   = document.getElementById('form-notes').value.trim();
  const emailEl = document.getElementById('form-email');
  const email   = emailEl ? emailEl.value.trim() : '';

  if (!name || !phone || !city || !address) {
    alert('Veuillez remplir tous les champs obligatoires (*).');
    return;
  }
  if (typeof window.finalizeCheckout !== 'function') {
    alert('Chargement en cours, réessayez dans 1 seconde.');
    return;
  }
  window.finalizeCheckout({ name, phone, city, address, notes, email });
}

function continueShopping() {
  window.location.href = '/categorie/sdb-premium/';
}

// ── MODAL CLICK-OUTSIDE ───────────────────────────────────────────────────────
document.getElementById('form-modal').addEventListener('click', function(e) {
  if (e.target === this) closeOrderModal();
});
document.querySelector('.modal-content').addEventListener('click', function(e) {
  e.stopPropagation();
});

// ── BOOT — wait for cart.js module, then render ───────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  waitForCart(renderCart);
});
// Also re-render whenever cart changes (e.g. from another tab)
document.addEventListener('cartUpdated', function() {
  if (typeof window.getCart === 'function') renderCart();
});
</script>
