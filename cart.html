<script type="module" src="/assets/cart.js"></script>
<script>
// 1. Délégation d'événements (plus robuste que onclick)
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  
  const key = btn.getAttribute('data-key');
  if (!key) return;

  if (btn.classList.contains('qty-plus')) {
    const cart = getCart();
    const item = cart.find(i => i.key === key);
    if (item) {
      item.quantity += 1;
      saveCart(cart);
      renderCart();
    }
  }

  if (btn.classList.contains('qty-minus')) {
    const cart = getCart();
    const item = cart.find(i => i.key === key);
    if (item && item.quantity > 1) {
      item.quantity -= 1;
      saveCart(cart);
      renderCart();
    }
  }

  if (btn.classList.contains('remove-btn')) {
    if (confirm('Retirer cet article ?')) {
      removeFromCart(key);
      renderCart();
    }
  }
});

function renderCart() {
  // On s'assure que les fonctions globales de cart.js sont prêtes
  if (typeof getCart !== 'function') {
    setTimeout(renderCart, 100);
    return;
  }

  const cart = getCart();
  const container = document.getElementById('cart-items-container');
  
  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <p>Votre panier est vide</p>
        <a href="/categorie/sdb-premium/" class="empty-cart-btn">Parcourir les produits</a>
      </div>
    `;
    updateCheckoutButtons();
    return;
  }
  
  // Utilisation de guillemets simples pour data-key='' afin de ne pas casser le JSON interne
  container.innerHTML = `
    <h2>Articles dans votre panier (${cart.length})</h2>
    ${cart.map((item) => `
      <div class="cart-item">
        <div class="item-name">
          <div><strong>${item.name}</strong></div>
          ${item.options ? `
            <div style="font-size: 12px; color: var(--muted); margin-top: 6px;">
              ${Object.entries(item.options).map(([k, v]) => `<div>• ${k}: ${v}</div>`).join('')}
            </div>
          ` : ''}
        </div>
        <div class="item-qty">
          <button class="qty-btn qty-minus" data-key='${item.key}'>−</button>
          <input type="number" class="qty-input" value="${item.quantity}" readonly>
          <button class="qty-btn qty-plus" data-key='${item.key}'>+</button>
        </div>
        <div class="item-price">${formatPrice(item.price * item.quantity)}</div>
        <button class="remove-btn" data-key='${item.key}'>Retirer</button>
      </div>
    `).join('')}
  `;
  
  updateSummary();
}

function updateSummary() {
  const total = getCartTotal();
  document.getElementById('subtotal').textContent = formatPrice(total);
  document.getElementById('total').textContent = formatPrice(total);
  if(document.getElementById('modal-total')) {
    document.getElementById('modal-total').textContent = formatPrice(total);
  }
  updateCheckoutButtons();
}

function updateCheckoutButtons() {
  const cart = getCart();
  const actionsDiv = document.getElementById('checkout-actions');
  const noteDiv = document.getElementById('order-note');
  
  if (cart.length === 0) {
    actionsDiv.innerHTML = '';
    if(noteDiv) noteDiv.style.display = 'none';
    return;
  }
  
  if(noteDiv) noteDiv.style.display = 'block';
  const total = getCartTotal();
  const cartSummary = encodeURIComponent(cart.map(i => `${i.name} x${i.quantity}`).join('\n'));
  const whatsappUrl = `https://wa.me/212707074748?text=Commande%20Nova%20Style:%0A${cartSummary}%0ATotal:%20${total}%20MAD`;
  
  actionsDiv.innerHTML = `
    <a href="${whatsappUrl}" target="_blank" class="btn-checkout btn-whatsapp">💬 Acheter via WhatsApp</a>
    <button onclick="openOrderModal()" class="btn-checkout btn-form">📝 Remplir le formulaire</button>
  `;
}

// Les fonctions de la modale restent identiques à ton code original...
function openOrderModal() { document.getElementById('form-modal').classList.add('active'); }
function closeOrderModal() { document.getElementById('form-modal').classList.remove('active'); }

window.submitOrder = function() {
  const details = {
    name: document.getElementById('form-name').value,
    phone: document.getElementById('form-phone').value,
    city: document.getElementById('form-city').value,
    address: document.getElementById('form-address').value,
    notes: document.getElementById('form-notes').value
  };
  
  if (window.finalizeCheckout) {
    window.finalizeCheckout(details);
  }
};

document.addEventListener('DOMContentLoaded', renderCart);
</script>
