<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Style — Boutique</title>
<meta name="description" content="Boutique Nova Style - Miroirs, douches et mobilier sur mesure au Maroc">
<link rel="stylesheet" href="/assets/style.css">
<style>
  .notification {
    position: fixed;
    bottom: 100px;
    right: 20px;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 999;
  }
  .notification.show {
    opacity: 1;
  }
  
  .shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1300px;
    margin: 24px auto;
    padding: 0 20px;
  }
  
  .shop-header h1 {
    font-size: 28px;
    margin: 0;
  }
  
  .cart-link {
    position: relative;
    display: inline-block;
    padding: 12px 16px;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  
  .cart-link:hover {
    opacity: 0.9;
  }
  
  #cart-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--red);
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
  }
  
  .products-grid {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  
  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  }
  
  .product-image {
    aspect-ratio: 1;
    background: var(--bg-soft);
    overflow: hidden;
    flex-shrink: 0;
  }
  
  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  
  .product-card:hover .product-image img {
    transform: scale(1.05);
  }
  
  .product-info {
    padding: 14px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  
  .product-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 32px;
  }
  
  .product-category {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  
  .product-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
  }
  
  .add-to-cart-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    font-size: 14px;
  }
  
  .add-to-cart-btn:hover {
    opacity: 0.9;
  }
  
  .add-to-cart-btn:active {
    transform: scale(0.98);
  }
  
  .empty-shop {
    text-align: center;
    padding: 60px 20px;
  }
  
  .empty-shop p {
    color: var(--muted);
    margin-bottom: 20px;
  }
  
  @media (max-width: 640px) {
    .products-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 12px;
    }
    
    .shop-header {
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }
  }
</style>
<link rel="preconnect" href="https://nova-9ac76-default-rtdb.europe-west1.firebasedatabase.app" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
</head>
<body>

<div class="announce">Acompte de 50% requis pour confirmer votre commande · Livraison partout au Maroc</div>

<header class="site-header">
  <a href="/" class="brand">
    <img src="/assets/logo.png" alt="Nova Style" class="logo">
    <div>
      <div class="brand-name">Nova Style</div>
      <div class="tagline">La beauté dans le miroir</div>
    </div>
  </a>
  <nav class="main-nav">
    <a href="/">Accueil</a>
    <a href="/shop">Boutique</a>
    <a href="/categorie/sdb-premium/">Miroirs Premium</a>
    <a href="/categorie/salon/">Salon & dressing</a>
  </nav>
</header>

<div class="shop-header">
  <h1>Boutique Nova Style</h1>
  <a href="/cart.html" class="cart-link">
    🛒 Panier
    <span id="cart-badge"></span>
  </a>
</div>

<div class="products-grid" id="products-grid"></div>

<footer style="text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; border-top: 1px solid var(--border);">
  <p>© 2024 Nova Style · Casablanca · <a href="tel:+212707074748" style="color: var(--accent);">+212 70 70 74 748</a></p>
</footer>

<script type="module" src="/assets/cart.js"></script>
<script>
let allProducts = [];

// Load products from JSON
async function loadProducts() {
  try {
    const response = await fetch('/products.json');
    const data = await response.json();
    allProducts = data.products;
    renderProducts(allProducts);
  } catch (error) {
    console.error('Error loading products:', error);
    document.getElementById('products-grid').innerHTML = '<div class="empty-shop"><p>Erreur lors du chargement des produits</p></div>';
  }
}

function renderProducts(products) {
  const grid = document.getElementById('products-grid');
  
  if (products.length === 0) {
    grid.innerHTML = '<div class="empty-shop"><p>Aucun produit trouvé</p></div>';
    return;
  }
  
  grid.innerHTML = products.map(product => `
    <div class="product-card">
      <div class="product-image">
        <img src="${product.image}" alt="${product.name}" onerror="this.src='/assets/logo.png'">
      </div>
      <div class="product-info">
        <div class="product-category">${product.category}</div>
        <div class="product-name">${product.name}</div>
        <div class="product-price">${formatPrice(product.price)}</div>
        <button class="add-to-cart-btn" onclick="addProductToCart('${product.id}')">
          Ajouter au panier
        </button>
      </div>
    </div>
  `).join('');
}

function addProductToCart(productId) {
  const product = allProducts.find(p => p.id === productId);
  if (product) {
    addToCart(productId, product, null);
    updateCartBadge();
  }
}

function updateCartBadge() {
  try {
    const items = JSON.parse(localStorage.getItem('nova_style_cart') || '[]');
    const count = Array.isArray(items) ? items.reduce((s, i) => s + (i.quantity || 1), 0) : 0;
    const badge = document.getElementById('cart-badge');
    if (badge) {
      badge.textContent = count > 0 ? count : '';
      badge.style.display = count > 0 ? 'inline-flex' : 'none';
    }
  } catch(e) {}
}

// Load products on page load
document.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
